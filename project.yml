name: Audlog
options:
  bundleIdPrefix: com.audlog
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  Audlog:
    type: application
    platform: macOS
    sources:
      - path: Audlog
    info:
      path: Audlog/Info.plist
      properties:
        LSUIElement: true
        NSAppleEventsUsageDescription: "Audlog needs access to control Music to play tracks from your history."
        CFBundleDisplayName: Audlog
        CFBundleName: Audlog
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    entitlements:
      path: Audlog/Audlog.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audlog.app
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MRU883JADA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
      - package: HotKey
      - sdk: CoreAudio.framework
      - sdk: ServiceManagement.framework
