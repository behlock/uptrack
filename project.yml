name: PBTrack
options:
  bundleIdPrefix: com.pbtrack
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  PBTrack:
    type: application
    platform: macOS
    sources:
      - path: PBTrack
    info:
      path: PBTrack/Info.plist
      properties:
        LSUIElement: true
        NSAppleEventsUsageDescription: "PBTrack needs access to control Music to play tracks from your history."
        CFBundleDisplayName: PBTrack
        CFBundleName: PBTrack
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    entitlements:
      path: PBTrack/PBTrack.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pbtrack.app
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: MRU883JADA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    dependencies:
      - package: GRDB
      - package: HotKey
      - sdk: CoreAudio.framework
      - sdk: ServiceManagement.framework
