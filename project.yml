name: uptrack
options:
  bundleIdPrefix: com.uptrack
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.1.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  uptrack:
    type: application
    platform: macOS
    sources:
      - path: uptrack
    info:
      path: uptrack/Info.plist
      properties:
        LSUIElement: true
        NSAppleEventsUsageDescription: "uptrack needs access to control Music to play tracks from your history."
        CFBundleDisplayName: uptrack
        CFBundleName: uptrack
        CFBundleShortVersionString: "1.0.7"
        CFBundleVersion: "7"
        SUFeedURL: "https://behlock.github.io/uptrack/appcast.xml"
        SUPublicEDKey: "jNPt4Eid/3sp6mOMww36JmNt6v3vgyyJ28N6Q/zgvo4="
    entitlements:
      path: uptrack/uptrack.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uptrack.app
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: MRU883JADA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0.7"
        CURRENT_PROJECT_VERSION: "7"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
      - package: Sparkle
      - sdk: CoreAudio.framework
      - sdk: ServiceManagement.framework
