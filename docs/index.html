<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>uptrack</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #c8c8c8;
      --text: #0f0e12;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::selection {
      background-color: #0f0e12;
      color: #fefeff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 300;
      font-size: 0.875rem;
      line-height: 1.6;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 300ms, color 300ms;
    }

    .wrapper {
      max-width: 32rem;
      margin: 0 auto;
      padding: 4rem 1rem 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
    }

    h1 {
      font-weight: 700;
      font-size: 1em;
      margin-bottom: 1.5rem;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 1.5rem;
    }

    .download-link {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .download-link:hover {
      opacity: 0.6;
    }

    .meta {
      opacity: 0.6;
      font-size: 0.8em;
      margin-top: 0.75rem;
    }

    .meta a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .meta a:hover {
      opacity: 1;
    }

    @media (min-width: 640px) {
      body {
        font-size: 1rem;
      }

      .wrapper {
        padding: 6rem 2rem 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="content">
      <h1>uptrack</h1>
      <p class="subtitle">A macOS menu bar app that tracks your music playback history.</p>
      <p><a class="download-link" href="https://github.com/behlock/uptrack/releases/latest">Download Latest Release</a></p>
      <p class="meta">Requires macOS 14.0+</p>
    </div>
  </div>
  <script>
    (function () {
      var key = 'uptrack-theme-color';
      var body = document.body;
      var colors = [
        "#FFFFFF","#EEC301","#FC994B","#F4ABC6","#76AAC4","#00C078",
        "#E6E6E6","#FED725","#FDB57D","#C2211E","#FAD6E3","#9BC1D4","#00F599",
        "#CCCCCC","#BC9A01","#FED2AF","#E03634","#EE7CA6","#BFD7E3","#8FFFD5",
        "#B3B3B3","#897001","#FB7C18","#E66260","#E84F88","#E2EDF3","#008F59",
        "#999999","#DDC246","#DD6304","#ED8E8C","#E22269","#5495B5","#1DA371",
        "#808080","#BCAD67","#AB4D03","#F4B9B8","#FFA0C3","#58B4E2","#3A866A",
        "#A69F7D","#E19C66","#E00400","#E6B9CA","#3BBEFF","#25D090",
        "#EDDE9C","#C59F82","#FF1814","#D8C7CD","#2FA1DA","#49AB87",
        "#DBD3AD","#E9B790","#FF4A47","#EEE2E6","#0AADFF","#629381",
        "#9F881D","#D5BAA4","#783534","#FF6BA2","#6C8D9D","#A0EED1",
        "#7A7043","#EAD4C3","#A04140","#D892AC","#86C8EA","#B0DDCD",
        "#746315","#D8803B","#BC5957","#C2A8B2","#70CFFF",
        "#CAAC25","#B5855E","#CB7D7C","#FF3882","#B1DCF1",
        "#A69549","#9E8776","#D9A1A0","#CA6D8F","#A3E0FF",
        "#9A8E55","#BB6726","#AC8B97","#D6F1FF",
        "#996B48","#FF0562",
        "#826E5F","#BD4773",
        "#91501D","#976D7D",
        "#655548"
      ];

      function luminance(hex) {
        var r = parseInt(hex.slice(1, 3), 16) / 255;
        var g = parseInt(hex.slice(3, 5), 16) / 255;
        var b = parseInt(hex.slice(5, 7), 16) / 255;
        r = r <= 0.03928 ? r / 12.92 : Math.pow((r + 0.055) / 1.055, 2.4);
        g = g <= 0.03928 ? g / 12.92 : Math.pow((g + 0.055) / 1.055, 2.4);
        b = b <= 0.03928 ? b / 12.92 : Math.pow((b + 0.055) / 1.055, 2.4);
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }

      function textColor(bg) {
        return luminance(bg) > 0.4 ? '#0f0e12' : '#fefeff';
      }

      function applyColor(hex) {
        body.style.setProperty('--bg', hex);
        body.style.setProperty('--text', textColor(hex));
      }

      var stored = localStorage.getItem(key);
      if (stored && colors.indexOf(stored) !== -1) {
        applyColor(stored);
      }
    })();
  </script>
</body>
</html>
